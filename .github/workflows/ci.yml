name: ci

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Shell syntax check
        run: for f in scripts/*.sh; do bash -n "$f"; done
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Python syntax check
        run: python -m py_compile tools/*.py

  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Verilator + LLVM RISC-V cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator clang lld llvm python3
      - name: Build both cores (single-cycle + pipeline)
        run: make -C sim/verilator both
      - name: Run RV32I self-checking test suite (single-cycle)
        run: make -C sw/tests run
      - name: Pipeline differential vs single-cycle reference (M2)
        run: bash scripts/run_pipe_diff.sh
